<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>THE HANGOUT</title>
  <link rel="stylesheet" href="/style.css" />
</head>

<body>
  <div id="app">
    <div id="desktop-controls" class="version-info top-left" style="display: none;">
      <b>Controls</b><br>
      Move: WASD<br>
      Look: Mouse<br>
      Menu: M<br>
      Grab: E / Click<br>
      Hands: 1 (L), 2 (R)<br>
      Reach: Wheel
    </div>
  </div>

  <!-- UI Overlay -->
  <div id="ui-overlay" class="overlay">
    <div class="panel">
      <h1>🎮 THE HANGOUT</h1>
      <p>Komm in die Cyber-Stube und Häng ab!</p>

      <div class="input-group">
        <label for="player-name">Name:</label>
        <div style="display: flex; gap: 8px;">
          <input type="text" id="player-name" placeholder="Enter your name" style="flex: 1;" />
          <button id="avatar-btn" class="icon-btn" title="Customize Avatar">👤</button>
        </div>
      </div>

      <div class="input-group">
        <label for="room-id">Room Name:</label>
        <div class="action-stack">
          <div class="input-with-icon">
            <input type="text" id="room-id" placeholder="TestRoom" />
            <button id="copy-room-btn" class="icon-btn" title="Copy Room Link">📋</button>
          </div>
          <div id="network-mode" class="network-mode-badge"></div>
          <div class="action-row">
            <button id="create-btn" class="primary-btn">Host & Play</button>
            <button id="dedicated-host-btn" class="primary-btn secondary-style">Dedicated Host</button>
            <button id="join-btn" class="primary-btn">Join</button>
          </div>
        </div>
      </div>

      <div class="input-group">
        <button id="voice-btn" class="primary-btn secondary-style">Enable Voice Chat</button>
      </div>



      <div id="status-text" class="status"></div>
      <div id="error-text" class="error-msg"></div>

      <!-- Avatar Customization Modal -->
      <div id="avatar-dialog" class="modal-overlay" style="display: none;">
        <div class="modal-content">
          <h2>CUSTOMIZE AVATAR</h2>
          <div class="input-group">
            <label for="avatar-color">GLOW COLOR</label>
            <input type="color" id="avatar-color" value="#00ffff">
          </div>
          <button id="close-avatar-btn" class="primary-btn">DONE</button>
        </div>
      </div>
    </div>

    <!-- Build Information -->
    <div class="version-info bottom-left" id="app-version">v1.0.0alpha</div>
    <div class="version-info bottom-right" id="git-sha">build: 8133d1d</div>
  </div>

  <!-- Mobile HUD (Joysticks) -->
  <div id="mobile-hud" style="display: none;">
    <div id="joystick-left" class="joy-container"></div>
    <div id="joystick-right" class="joy-container"></div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>

</html>
