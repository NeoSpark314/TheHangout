<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <link rel="icon" type="image/svg+xml" href="/th-logo.svg" />
  <title>THE HANGOUT</title>
  <link rel="stylesheet" href="/style.css" />
</head>

<body>
  <div id="app">
    <div id="desktop-controls" class="version-info top-left is-hidden"></div>
  </div>

  <!-- UI Overlay -->
  <div id="ui-overlay" class="overlay">
    <div id="main-panel" class="panel panel-hydrating">
      <h1>🎮 THE HANGOUT</h1>
      <p>Komm in die Cyber-Stube und Häng ab!</p>

      <div class="input-group">
        <label for="player-name">Name:</label>
        <div class="inline-row">
          <input type="text" id="player-name" class="grow" placeholder="Enter your name" />
          <button id="avatar-btn" class="icon-btn" title="Customize Avatar">👤</button>
          <button id="extensions-btn" class="icon-btn" title="Extensions / Settings">⚙️</button>
        </div>
      </div>

      <div class="input-group">
        <label for="session-id">Session Name:</label>
        <div class="action-stack" id="session-controls">
          <div class="input-with-icon">
            <input type="text" id="session-id" placeholder="neon-wave-42" />
            <button id="copy-session-btn" class="icon-btn" title="Copy Session Link">📋</button>
          </div>
          <div id="network-mode" class="network-mode-badge"></div>
          <div class="action-row">
            <button id="create-btn" class="primary-btn">Host & Play</button>
            <button id="join-btn" class="primary-btn">Join</button>
          </div>
        </div>
      </div>

      <div class="input-group">
        <button id="voice-btn" class="primary-btn secondary-style">Auto Mic: On</button>
      </div>



      <div id="status-text" class="status"></div>
      <div id="error-text" class="error-msg"></div>

      <!-- Avatar Customization Modal -->
      <div id="avatar-dialog" class="modal-overlay is-hidden">
        <div class="modal-content">
          <h2>Customize Avatar</h2>
          <div class="avatar-compact-row">
            <div class="input-group avatar-color-group">
              <label for="avatar-color">Color</label>
              <input type="color" id="avatar-color">
            </div>
            <div class="input-group avatar-height-group">
              <label for="avatar-height-m">Height (m)</label>
              <input type="number" id="avatar-height-m" min="1.2" max="2.3" step="0.01" value="1.8" />
            </div>
          </div>

          <div class="input-group avatar-url-group">
            <label for="avatar-vrm-url">VRM URL</label>
            <div class="avatar-url-row">
              <input type="text" id="avatar-vrm-url" placeholder="/storage/assets/my-avatar.vrm or https://..." />
              <button id="clear-avatar-vrm-btn" class="primary-btn secondary-style avatar-clear-btn" type="button">Clear</button>
            </div>
          </div>
          <div id="avatar-vrm-status" class="status"></div>
          <button id="close-avatar-btn" class="primary-btn">Done</button>
        </div>
      </div>
    </div>

    <!-- Extension Settings Modal -->
    <div id="extensions-dialog" class="modal-overlay is-hidden">
      <div class="modal-content" style="max-height: 80vh; overflow-y: auto;">
        <h2>Extension Settings</h2>
        <div id="extensions-container" class="settings-container"></div>
        <button id="close-extensions-btn" class="primary-btn">Done</button>
      </div>
    </div>

    <!-- Build Information -->
    <div class="version-info bottom-left" id="app-version">v1.0.0alpha</div>
    <div class="version-info bottom-right" id="git-sha">build: 8133d1d</div>
  </div>

  <!-- Mobile HUD (Joysticks) -->
  <button id="mobile-menu-btn" class="is-hidden" aria-label="Toggle menu">Menu</button>
  <div id="mobile-hud" class="is-hidden">
    <div id="mobile-reticle" aria-hidden="true"></div>
    <button id="mobile-action-btn" class="is-hidden" aria-label="Primary action">Grab</button>
    <button id="mobile-interact-btn" class="is-hidden" aria-label="Secondary action">Use</button>
    <div id="joystick-left" class="joy-container"></div>
    <div id="joystick-right" class="joy-container"></div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>

</html>
