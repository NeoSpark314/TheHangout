<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TheHangout</title>
  <link rel="stylesheet" href="/style.css" />
</head>

<body>
  <!-- 3D Canvas Container -->
  <div id="app"></div>

  <!-- UI Overlay -->
  <div id="ui-overlay" class="overlay">
    <div class="panel">
      <h1>🎮 TheHangout</h1>
      <p>A WebXR Multiplayer Playground</p>

      <div class="input-group">
        <label for="player-name">Name:</label>
        <input type="text" id="player-name" placeholder="Enter your name" />
      </div>

      <div class="input-group">
        <label for="room-id">Room Name:</label>
        <div class="action-stack">
          <div class="input-with-icon">
            <input type="text" id="room-id" placeholder="TestRoom" />
            <button id="copy-room-btn" class="icon-btn" title="Copy Room Link">📋</button>
          </div>
          <div class="action-row">
            <button id="create-btn" class="primary-btn">Host</button>
            <button id="join-btn" class="primary-btn">Join</button>
          </div>
        </div>
      </div>



      <div id="status-text" class="status"></div>
      <div id="error-text" class="error-msg"></div>
    </div>
  </div>

  </div>

  <script type="module" src="/src/main.js"></script>

  <script type="module" src="/src/main.js"></script>
</body>

</html>
